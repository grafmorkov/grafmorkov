<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3b30"/>
      <stop offset="50%" stop-color="#ff6a2a"/>
      <stop offset="100%" stop-color="#ffa600"/>
    </linearGradient>

    <style>
      .bg { fill: #0b0b0b; }
      .panel { fill: #101010; stroke: #222; stroke-width: 1; }
      .bar { fill: #161616; }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 15px;
        fill: #e6e6e6;
      }
      .dim { fill: #9a9a9a; }
      .accent { fill: url(#g); }
      .cmd { fill: #ff3b30; }
      .label { fill: #ff6a2a; }
      .cursor {
        fill: #ffa600;
        animation: blink 1s steps(2,end) infinite;
      }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="650"/>
  <rect class="panel" x="20" y="20" width="1060" height="610" rx="12"/>
  <rect class="bar" x="20" y="20" width="1060" height="40" rx="12"/>

  <circle cx="50" cy="40" r="6" fill="#ff5f56"/>
  <circle cx="70" cy="40" r="6" fill="#ffbd2e"/>
  <circle cx="90" cy="40" r="6" fill="#27c93f"/>
  <text x="130" y="45" class="mono dim">grafmorkov@github ~</text>

  <text x="50" y="100" class="mono cmd">$ neofetch</text>

  <text x="50" y="140" class="mono"><tspan class="label">user</tspan>      <tspan dx="30">grafmorkov</tspan></text>
  <text x="50" y="170" class="mono"><tspan class="label">os</tspan>        <tspan dx="48">github</tspan></text>
  <text x="50" y="200" class="mono"><tspan class="label">focus</tspan>     <tspan dx="20">systems / compilers / low-level</tspan></text>

  <text x="50" y="250" class="mono"><tspan class="label">languages</tspan> <tspan dx="10">C, C++, C#</tspan></text>
  <text x="50" y="280" class="mono"><tspan class="label">engine</tspan>    <tspan dx="20">Unity (legacy)</tspan></text>

  <text x="50" y="330" class="mono"><tspan class="label">project</tspan>   <tspan dx="15">Quark (language)</tspan></text>
  <text x="50" y="360" class="mono"><tspan class="label">repo</tspan>      <tspan dx="30">github.com/grafmorkov/Quark</tspan></text>

  <text x="50" y="410" class="mono"><tspan class="label">status</tspan>    <tspan dx="20">developing compiler</tspan></text>

  <text x="520" y="100" class="mono cmd">$ cat ~/projects/quark</text>
  <text x="520" y="140" class="mono dim">Quark is a compiler-based language project.</text>
  <text x="520" y="165" class="mono dim">Predictable behavior, explicit state, no hidden runtime.</text>
  <text x="520" y="190" class="mono dim">Memory is always explicit.</text>

  <text x="520" y="230" class="mono">
    <tspan fill="#ff6a2a">Pipeline:</tspan>
    Source → AST → IR → checks → C → native binary
  </text>

  <text x="520" y="270" class="mono dim">C is used as backend, not core language.</text>

  <text x="520" y="330" class="mono cmd">$ cat stack.conf</text>
  <text x="520" y="370" class="mono"><tspan class="label">C++</tspan>  low-level systems / backend</text>
  <text x="520" y="395" class="mono"><tspan class="label">C</tspan>    memory-level tooling</text>
  <text x="520" y="420" class="mono"><tspan class="label">C#</tspan>   Unity legacy</text>
  <text x="520" y="445" class="mono"><tspan class="label">Compiler</tspan> lexer / IR / codegen</text>

  <text x="50" y="500" class="mono cmd">$ curl contact.local</text>
  <text x="50" y="540" class="mono">Discord  <tspan class="accent">grafmorkov</tspan></text>
  <text x="250" y="540" class="mono">Telegram <tspan class="accent">@grafmorkov</tspan></text>

  <rect x="420" y="527" width="8" height="16" class="cursor"/>
</svg>