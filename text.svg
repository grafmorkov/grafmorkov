    <tspan x="20" dy="1.5em" fill="#ff6a2a">project</tspan>   <tspan fill="#ffffff">Quark (language)</tspan>
    <tspan x="20" dy="1.2em" fill="#ff6a2a">repo</tspan>      <tspan fill="#ffffff">github.com/grafmorkov/quark-lang</tspan>

    <tspan x="20" dy="1.5em" fill="#ff6a2a">uptime</tspan>    <tspan fill="#ffffff">3+ year</tspan>
    <tspan x="20" dy="1.2em" fill="#ff6a2a">status</tspan>    <tspan fill="#ffffff">developing compiler</tspan>

    <tspan x="20" dy="2em" fill="#ff3b30">$ cat ~/projects/quark</tspan>

    <tspan x="20" dy="1.5em" fill="#ffffff">Quark is a compiler-based language project.</tspan>
    <tspan x="20" dy="1.2em" fill="#ffffff">It focuses on:</tspan>
    <tspan x="20" dy="1.2em" fill="#ffffff">- predictable behavior</tspan>
    <tspan x="20" dy="1.2em" fill="#ffffff">- explicit state</tspan>
    <tspan x="20" dy="1.2em" fill="#ffffff">- simple rules</tspan>
    <tspan x="20" dy="1.2em" fill="#ffffff">- no hidden runtime behavior</tspan>
    <tspan x="20" dy="1.2em" fill="#ffffff">- memory is always explicit</tspan>

    <tspan x="20" dy="1.5em" fill="#ffffff">Pipeline: Source → AST → IR → checks → C → native binary</tspan>

