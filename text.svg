    <tspan x="20" dy="2em" fill="#ff3b30">$ neofetch</tspan>

    <tspan x="20" dy="1.5em" fill="#ff6a2a">user</tspan>      <tspan fill="#ffffff">grafmorkov</tspan>
    <tspan x="20" dy="1.2em" fill="#ff6a2a">os</tspan>        <tspan fill="#ffffff">github</tspan>
